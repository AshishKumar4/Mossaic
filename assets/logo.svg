<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Mossaic">
  <title>Mossaic</title>
  <!-- Mark: 3×3 tile mosaic with one tile offset to suggest chunk sharding. -->
  <g transform="translate(8 8)">
    <!-- Row 1 -->
    <rect x="0"  y="0"  width="18" height="18" rx="3" fill="#1F1F1F"/>
    <rect x="22" y="0"  width="18" height="18" rx="3" fill="#1F1F1F"/>
    <rect x="44" y="0"  width="18" height="18" rx="3" fill="#1F1F1F" opacity="0.85"/>
    <!-- Row 2 -->
    <rect x="0"  y="22" width="18" height="18" rx="3" fill="#1F1F1F" opacity="0.85"/>
    <rect x="22" y="22" width="18" height="18" rx="3" fill="#F38020"/>
    <rect x="44" y="22" width="18" height="18" rx="3" fill="#1F1F1F"/>
    <!-- Row 3 — one tile shifted to evoke distributed shards -->
    <rect x="0"  y="44" width="18" height="18" rx="3" fill="#1F1F1F"/>
    <rect x="22" y="44" width="18" height="18" rx="3" fill="#1F1F1F" opacity="0.85"/>
    <rect x="48" y="48" width="18" height="18" rx="3" fill="#F38020" opacity="0.85"/>
  </g>
  <!-- Wordmark -->
  <text x="92" y="50"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="36" font-weight="700" fill="#1F1F1F" letter-spacing="-0.5">
    Mossaic
  </text>
</svg>
